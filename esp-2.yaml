          ec[22]  = "HP_GEN_FAULT_XTP_DEVICE_REFRIGERANT_LIQUID";
          ec[23]  = "HP_GEN_FAULT_XTP_DEVICE_REFRIGERANT_GAS";
          ec[128] = "AC_BUS_VOLTAGE_HIGH";
          ec[129] = "AC_BUS_VOLTAGE_LOW";
          ec[130] = "DC_BUS_OVERVOLTAGE";
          ec[131] = "COMPRESSOR_OVERCURRENT_HARDWARE";
          ec[132] = "COMPRESSOR_OVERCURRENT_FIRMWARE";
          ec[133] = "AC_INPUT_OVERCURRENT_HARDWARE";
          ec[134] = "AC_INPUT_OVERCURRENT_FIRMWARE";
          ec[135] = "COMPRESSOR_CURRENT_OVERLOAD";
          ec[136] = "PHASE_LOSS_LOSS_OF_SYNCHRONISM";
          ec[137] = "IPM_TEMP_PROTECTION";
          ec[138] = "OUTDOOR_DC_FAN_FAULT";
          ec[139] = "SUCTION_TEMP_SENSOR_ERROR";
          ec[140] = "ODU_DISCHARGE_TEMP_SENSOR_ERROR";
          ec[141] = "ODU_COIL_TEMP_SENSOR_ERROR";
          ec[142] = "AMBIENT_TEMP_SENSOR_ERROR";
          ec[143] = "DISCHARGE_TEMP_HIGH_ERROR";
          ec[144] = "CONDENSING_TEMP_HIGH_ERROR";
          ec[145] = "ODU_IDU_COMMUNICATION_ERROR";
          ec[146] = "DC_BUS_UNDERVOLTAGE";
          ec[255] = "NO_ERROR";
          ec[65535] = "UNCONNECTED";

interval:
  - interval: 50ms
    then:
      - lambda: |-
          while (id(uart_bus).available()) {
            uint8_t c;
            id(uart_bus).read_byte(&c);
            if (c == '\n') {
              json::parse_json(id(line_buffer), [](JsonObject root) -> bool {

                // FIX 1 — modern ArduinoJson check
                if (!root["stats"].is<JsonObject>()) return false;
                JsonObject stats = root["stats"].as<JsonObject>();

                // SELECT MAPPINGS
                for (JsonPair kv : stats) {
                  std::string code = kv.key().c_str();
                  float raw = kv.value().as<float>();

                  // status_5.workingMode - echte codes (0=Cooling,1=Heating,2=Defrosting,3=Pumpdown,255=Undefined)
                  if (code == "6578") {
                    int v = (int) raw;
                    std::string s;
                    switch (v) {
                      case 0: s = "Cooling"; break;
                      case 1: s = "Heating"; break;
                      case 2: s = "Defrosting"; break;
                      case 3: s = "Pumpdown"; break;
                      case 255: s = "Undefined"; break;
                      default: s = "Unknown (" + std::to_string(v) + ")"; break;
                    }
                    id(working_mode).publish_state(s);
                    continue;
                  }

                  // status_0.heatdemand_status - codetabel via globale map
                  if (code == "7e51") {
                    int v = (int) raw;
                    auto &mm = id(heatdemand_status_map);
                    auto it2 = mm.find(v);
                    id(heatdemand_status).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                    continue;
                  }

                  // status_0.lockout_code - codetabel via globale map
                  if (code == "7e2c") {
                    int v = (int) raw;
                    auto &mm = id(lockout_code_map);
                    auto it2 = mm.find(v);
                    id(lockout_code).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                    continue;
                  }

                  // status_9.errorCode - codetabel via globale map
                  if (code == "4133") {
                    int v = (int) raw;
                    auto &mm = id(error_code_map);
                    auto it2 = mm.find(v);
                    id(error_code).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                    continue;
                  }

                  // boiler_control.boiler_control_flags - bitmasker, toon actieve vlaggen
                  if (code == "b28c") {
                    uint32_t v = (uint32_t) raw;
                    static const char* bitnames[] = {"bBoilerOvertemperatureShutdown", "bBoilerNoReponse", "bLowLoadFlameOn", "bLowLoadFlameOnPrev", "bTemperatureBlankingActive"};
                    std::string s;
                    for (int b = 0; b < 5; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                    id(boiler_control_flags).publish_state(s.empty() ? "None" : s);
                    continue;
                  }

                  // status_3.Flags - bitmasker, toon actieve vlaggen
                  if (code == "77c3") {
                    uint32_t v = (uint32_t) raw;
                    static const char* bitnames[] = {"bLowLoadEnable", "bControlSupplyTemperature", "bProgressiveTempRequest", "bSilentModeActive", "bHeatpumpForceMaxPower", "bHeatpumpRegulateMaxPower", "bHeatWasAtMinimumFreq", "bCompressorWasOn"};
                    std::string s;
                    for (int b = 0; b < 8; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                    id(status3_flags).publish_state(s.empty() ? "None" : s);
                    continue;
                  }

                  // status_3.SystemIo - bitmasker, toon actieve vlaggen
                  if (code == "77d2") {
                    uint32_t v = (uint32_t) raw;
                    static const char* bitnames[] = {"dhwPumpOn", "chPumpOn", "pressureDetected", "systemFlowDetected", "dhwFlowDetected", "compressorRunning", "switched_on", "boiler_opentherm_connected", "boiled_requested", "thermostat_ot1_opentherm_connected", "thermostat_ot1_shortcircuit", "thermostat_ot2_opentherm_connected", "thermostat_ot2_shortcircuit", "commissioning", "gateway_connected"};
                    std::string s;
                    for (int b = 0; b < 15; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                    id(system_io).publish_state(s.empty() ? "None" : s);
                    continue;
                  }

                  // status_5.digitalOut - bitmasker, toon actieve vlaggen
                  if (code == "65d0") {
                    uint32_t v = (uint32_t) raw;
                    static const char* bitnames[] = {"compressor", "waterpump", "fourWayValve", "fanMotor", "antifreezeHeatingStrip", "crankAntifreezeHeatingStrip", "sprayValve", "auxiliaryElectricHeater", "dhwPump", "threewayValve"};
                    std::string s;
                    for (int b = 0; b < 10; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                    id(digital_out).publish_state(s.empty() ? "None" : s);
                    continue;
                  }

                  // bivalent_service.flags - bitmasker, toon actieve vlaggen
                  if (code == "f9f2") {
                    uint32_t v = (uint32_t) raw;
                    static const char* bitnames[] = {"HeatpumpNotAllowed", "HPFailedBackupActive", "BoilerNeeded", "HPCopEfficiencyOkay", "InitialDelayDone", "bStartWithBoilerImmediatly", "bBackupReqPrev", "bHeatpumpRequested", "bBoilerRequested", "bBoilerActualState", "bBoilerOpenLoopControl", "bBoilerFlameDetected", "bBoilerFlameDurShort", "bLowLoadDetected", "bDefrostActive", "bBlockHpClockProgram"};
                    std::string s;
                    for (int b = 0; b < 16; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                    id(bivalent_flags).publish_state(s.empty() ? "None" : s);
                    continue;
                  }
                }

                // GENERIEKE SENSOREN
                for (JsonPair kv : stats) {
                  std::string code = kv.key().c_str();
                  auto it = id(xtend_sensors).find(code);
                  if (it == id(xtend_sensors).end()) continue;

                  sensor::Sensor *s = std::get<0>(it->second);
                  float factor = std::get<1>(it->second);
                  bool filter_na = std::get<2>(it->second);

                  float raw = kv.value().as<float>();
                  if (filter_na && (raw == 32767 || raw == -32767)) continue;

                  s->publish_state(raw * factor);
                }

                // FIX 2 — modern ArduinoJson check
                if (stats["47e0"].is<const char*>())
                  id(software_version).publish_state(stats["47e0"].as<std::string>());

                return true;
              });
              id(line_buffer).clear();
            } else {
              id(line_buffer) += (char) c;
            }
          }

