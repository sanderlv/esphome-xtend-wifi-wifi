          ec[12]  = "HP_GEN_FAULT_CONDENSOR_GAS_TOO_LOW";
          ec[13]  = "HP_GEN_FAULT_NO_TOUTDOOR_SENSOR";
          ec[14]  = "HP_GEN_FAULT_PUMPDOWN_FAILED";
          ec[15]  = "HP_GEN_FAULT_DSH_TOO_LOW";
          ec[16]  = "HP_GEN_FAULT_SSH_TOO_LOW";
          ec[17]  = "HP_GEN_FAULT_SSH_TOO_HIGH";
