          lc[51]  = "LOCKOUT_CODE_THERMOSTAT_BOILER";
          lc[254] = "LOCKOUT_BYPASS_MODE_ACTIVE";
          lc[255] = "LOCKOUT_NO_ERROR";

          // status_9.errorCode (key 4133) - codes uit parse-message.js
          auto &ec = id(error_code_map);
          ec[0]   = "HP_GEN_FAULT_NONE";
          ec[1]   = "HP_GEN_FAULT_DEFROST_FAILED";
          ec[2]   = "HP_GEN_FAULT_LOW_PRESSURE";
          ec[3]   = "HP_GEN_FAULT_HIGH_PRESSURE";
          ec[4]   = "HP_GEN_FAULT_COMPRESSOR_OUTSIDE_OP_RANGE";
          ec[5]   = "HP_GEN_FAULT_EXHAUST_TEMP_TOO_HIGH";
          ec[6]   = "HP_GEN_FAULT_CONDENSOR_TEMP_TOO_HIGH";
          ec[7]   = "HP_GEN_FAULT_OUTDOORUNIT_SPECIFIC_AUTO_RESTART";
