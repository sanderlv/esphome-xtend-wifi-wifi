# ESP-2 voor de xTend

substitutions:
  esp_name: esp-2
  ssid: YOURSSID
  password: YOURPASSWORD

esp32:
  board: lolin_s3_mini # Change for you board
  framework:
    type: esp-idf

wifi:
  ssid: $ssid
  password: $password
  #use_address: 192.168.6.112
  ap:
    ssid: "${esp_name} FBHS"
    password: !secret Fallback_Hotspot

captive_portal:

logger:
  level: DEBUG

api:

ota:
  platform: esphome

time:
  - platform: homeassistant
    id: homeassistant_time

web_server:
  port: 80

json:

uart:
  id: uart_bus
  rx_pin: GPIO16
  baud_rate: 115200
  rx_buffer_size: 4096

globals:
  - id: line_buffer
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: xtend_sensors
    type: std::map<std::string, std::tuple<sensor::Sensor *, float, bool>>
    restore_value: false

esphome:
  name: $esp_name
  includes:
    - <map>
    - <tuple>
  on_boot:
    then:
      - lambda: |-
          auto &m = id(xtend_sensors);
          m["79b3"] = std::make_tuple(id(roomtemp_1), 0.01f, true);
          m["7921"] = std::make_tuple(id(roomtemp_set_1), 0.01f, true);
          m["7940"] = std::make_tuple(id(notification_code), 1.0f, false);
          m["50f2"] = std::make_tuple(id(power_electric), 0.001f, false);
          m["503e"] = std::make_tuple(id(hp_power_thermal), 0.001f, false);
          m["5041"] = std::make_tuple(id(current_cop), 0.1f, false);
          m["5088"] = std::make_tuple(id(boiler_power_thermal), 0.001f, false);
          m["5077"] = std::make_tuple(id(power_thermal), 0.001f, false);
          m["50ae"] = std::make_tuple(id(energy_thermal_heating_prevday), 0.1f, false);
          m["50f7"] = std::make_tuple(id(cop_heating_prevday), 0.1f, false);
          m["5099"] = std::make_tuple(id(energy_electric_heating_prevday), 0.1f, false);
          m["506a"] = std::make_tuple(id(energy_thermal_boiler_prevday), 0.1f, false);
          m["63f0"] = std::make_tuple(id(thermal_energy_heating_total), 1.0f, false);
          m["63b3"] = std::make_tuple(id(electric_energy_heating_total), 1.0f, false);
          m["63df"] = std::make_tuple(id(thermal_energy_boiler_total), 1.0f, false);
          m["6a8e"] = std::make_tuple(id(start_heating_counter), 1.0f, false);
          m["6ac5"] = std::make_tuple(id(operation_heating_hours), 1.0f, false);
          m["71a7"] = std::make_tuple(id(poweron_hours), 1.0f, false);
          m["7160"] = std::make_tuple(id(poweron_number), 1.0f, false);
          m["6a53"] = std::make_tuple(id(start_defrost_counter), 1.0f, false);
          m["8e00"] = std::make_tuple(id(boiler_burner_starts), 1.0f, false);
          m["8ef9"] = std::make_tuple(id(boiler_ch_hours), 1.0f, false);
          m["8e37"] = std::make_tuple(id(boiler_dhw_hours), 1.0f, false);
          m["8e18"] = std::make_tuple(id(boiler_flame_loss), 1.0f, false);
          m["65b0"] = std::make_tuple(id(exhaust_pressure), 0.01f, false);
          m["6579"] = std::make_tuple(id(suction_pressure), 0.01f, false);
          m["7ed3"] = std::make_tuple(id(water_pressure), 0.01f, true);
          m["629c"] = std::make_tuple(id(flow_system), 0.01f, false);
          m["6280"] = std::make_tuple(id(temp_hp_return), 0.01f, true);
          m["62e7"] = std::make_tuple(id(temp_hp_supply), 0.01f, true);
          m["7767"] = std::make_tuple(id(temp_requested), 0.01f, true);
          m["65d9"] = std::make_tuple(id(temp_exhaust), 0.01f, true);
          m["6505"] = std::make_tuple(id(temp_suction), 0.01f, true);
          m["6c66"] = std::make_tuple(id(eev_steps), 1.0f, false);
          m["62d1"] = std::make_tuple(id(temp_outdoor), 0.01f, true);
          m["84d1"] = std::make_tuple(id(boiler_modulation_level), 0.01f, false);
          m["6c53"] = std::make_tuple(id(temp_subcooling), 0.01f, true);
          m["6c26"] = std::make_tuple(id(temp_condensor_gas), 0.01f, true);
          m["6ceb"] = std::make_tuple(id(temp_condensor_liquid), 0.01f, true);
          m["7ee6"] = std::make_tuple(id(temp_supply), 0.01f, true);
          m["7e81"] = std::make_tuple(id(temp_return), 0.01f, true);
          m["7e31"] = std::make_tuple(id(temp_setpoint), 0.01f, true);

interval:
  - interval: 50ms
    then:
      - lambda: |-
          while (id(uart_bus).available()) {
            uint8_t c;
            id(uart_bus).read_byte(&c);
            if (c == '\n') {
              json::parse_json(id(line_buffer), [](JsonObject root) -> bool {

                // FIX 1 — modern ArduinoJson check
                if (!root["stats"].is<JsonObject>()) return false;
                JsonObject stats = root["stats"].as<JsonObject>();

                // SELECT MAPPINGS
                for (JsonPair kv : stats) {
                  std::string code = kv.key().c_str();
                  float raw = kv.value().as<float>();

                  if (code == "6578") { const char* o[]={"Idle","Heating","Cooling","Defrost"}; int v=raw; if(v>=0&&v<4) id(working_mode).publish_state(o[v]); continue; }
                  if (code == "7e51") { const char* o[]={"No demand","Heating","DHW","Cooling"}; int v=raw; if(v>=0&&v<4) id(heatdemand_status).publish_state(o[v]); continue; }
                  if (code == "b2bc") { const char* o[]={"Off","Ignition","Burning"}; int v=raw; if(v>=0&&v<3) id(boiler_flame_state).publish_state(o[v]); continue; }
                  if (code == "b28c") { const char* o[]={"None","CH","DHW","CH + DHW"}; int v=raw; if(v>=0&&v<4) id(boiler_control_flags).publish_state(o[v]); continue; }
                  if (code == "77c3") { const char* o[]={"Idle","Heating","Cooling","Defrost","Error"}; int v=raw; if(v>=0&&v<5) id(status3_flags).publish_state(o[v]); continue; }
                  if (code == "77d2") { id(system_io).publish_state(raw==0?"Off":"On"); continue; }
                  if (code == "65d0") { id(digital_out).publish_state(raw==0?"Off":"On"); continue; }
                  if (code == "f9f2") { const char* o[]={"HP only","Boiler only","Hybrid"}; int v=raw; if(v>=0&&v<3) id(bivalent_flags).publish_state(o[v]); continue; }
                  if (code == "7e2c") { const char* o[]={"None","Warning","Lockout"}; int v=raw; if(v>=0&&v<3) id(lockout_code).publish_state(o[v]); continue; }
                  if (code == "8439") { const char* o[]={"None","Warning","Fault"}; int v=raw; if(v>=0&&v<3) id(boiler_oem_faultcode).publish_state(o[v]); continue; }
                  if (code == "4133") { const char* o[]={"None","Warning","Error"}; int v=raw; if(v>=0&&v<3) id(error_code).publish_state(o[v]); continue; }
                }

                // GENERIEKE SENSOREN
                for (JsonPair kv : stats) {
                  std::string code = kv.key().c_str();
                  auto it = id(xtend_sensors).find(code);
                  if (it == id(xtend_sensors).end()) continue;

                  sensor::Sensor *s = std::get<0>(it->second);
                  float factor = std::get<1>(it->second);
                  bool filter_na = std::get<2>(it->second);

                  float raw = kv.value().as<float>();
                  if (filter_na && (raw == 32767 || raw == -32767)) continue;

                  s->publish_state(raw * factor);
                }

                // FIX 2 — modern ArduinoJson check
                if (stats["47e0"].is<const char*>())
                  id(software_version).publish_state(stats["47e0"].as<std::string>());

                return true;
              });
              id(line_buffer).clear();
            } else {
              id(line_buffer) += (char) c;
            }
          }

