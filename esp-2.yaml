interval:
  - interval: 50ms
    then:
      - lambda: |-
          while (id(uart_bus).available()) {
                      uint8_t c;
                      id(uart_bus).read_byte(&c);
                      if (c == '\n') {
                        json::parse_json(id(line_buffer), [](JsonObject root) -> bool {

                          // FIX 1 — modern ArduinoJson check
                          if (!root["stats"].is<JsonObject>()) return false;
                          JsonObject stats = root["stats"].as<JsonObject>();

                          // DEBUG: toon alle ontvangen codes 1x per regel (verwijder als niet meer nodig)
                          std::string seen_codes;
                          for (JsonPair kv : stats) { seen_codes += kv.key().c_str(); seen_codes += " "; }
                          ESP_LOGD("xtend_debug", "Ontvangen codes (%d): %s", (int) stats.size(), seen_codes.c_str());

                          // EEN doorloop: per key eerst enum/bitmasker-checks, anders generieke sensor
                          for (JsonPair kv : stats) {
                            std::string code = kv.key().c_str();
                            float raw = kv.value().as<float>();

                            // status_9.errorCode (4133) -> error_code_map
                            if (code == "4133") {
                              int v = (int) raw;
                              auto &mm = id(error_code_map);
                              auto it2 = mm.find(v);
                              id(error_code).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_5.workingMode (6578) -> working_mode_map
                            if (code == "6578") {
                              int v = (int) raw;
                              auto &mm = id(working_mode_map);
                              auto it2 = mm.find(v);
                              id(working_mode).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_3.RequestedHeatpumpMode (777d) -> hp_mode_map
                            if (code == "777d") {
                              int v = (int) raw;
                              auto &mm = id(hp_mode_map);
                              auto it2 = mm.find(v);
                              id(requested_heatpump_mode).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_3.SystemStatus (77dd) -> task_status_map
                            if (code == "77dd") {
                              int v = (int) raw;
                              auto &mm = id(task_status_map);
                              auto it2 = mm.find(v);
                              id(system_status).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_1.notification_code (7940) -> notification_code_map
                            if (code == "7940") {
                              int v = (int) raw;
                              auto &mm = id(notification_code_map);
                              auto it2 = mm.find(v);
                              id(notification_code).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_0.lockout_code (7e2c) -> lockout_code_map
                            if (code == "7e2c") {
                              int v = (int) raw;
                              auto &mm = id(lockout_code_map);
                              auto it2 = mm.find(v);
                              id(lockout_code).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_0.heatdemand_status (7e51) -> heatdemand_status_map
                            if (code == "7e51") {
                              int v = (int) raw;
                              auto &mm = id(heatdemand_status_map);
                              auto it2 = mm.find(v);
                              id(heatdemand_status).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_0.burner_status (7e7a) -> burner_status_map
                            if (code == "7e7a") {
                              int v = (int) raw;
                              auto &mm = id(burner_status_map);
                              auto it2 = mm.find(v);
                              id(burner_status).publish_state(it2 != mm.end() ? it2->second : ("Unknown (" + std::to_string(v) + ")"));
                              continue;
                            }
                            // status_5.digitalOut (65d0) - bitmasker
                            if (code == "65d0") {
                              uint32_t v = (uint32_t) raw;
                              static const char* bitnames[] = {"Compressor", "Water pump", "4-way valve", "Fan motor", "Antifreeze heating strip", "Crankcase antifreeze heating strip", "Spray valve", "Auxiliary electric heater", "DHW pump", "3-way valve"};
                              std::string s;
                              for (int b = 0; b < 10; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                              id(digital_out).publish_state(s.empty() ? "None" : s);
                              continue;
                            }
                            // status_3.Flags (77c3) - bitmasker
                            if (code == "77c3") {
                              uint32_t v = (uint32_t) raw;
                              static const char* bitnames[] = {"Low load enabled", "Controlling supply temperature", "Progressive temperature request", "Silent mode active", "Heat pump forced to max power", "Heat pump regulating max power", "Was at minimum frequency", "Compressor was on"};
                              std::string s;
                              for (int b = 0; b < 8; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                              id(status3_flags).publish_state(s.empty() ? "None" : s);
                              continue;
                            }
                            // status_3.SystemIo (77d2) - bitmasker
                            if (code == "77d2") {
                              uint32_t v = (uint32_t) raw;
                              static const char* bitnames[] = {"DHW pump on", "CH pump on", "Pressure detected", "System flow detected", "DHW flow detected", "Compressor running", "Switched on", "Boiler OpenTherm connected", "Boiler requested", "Thermostat 1 OpenTherm connected", "Thermostat 1 short circuit", "Thermostat 2 OpenTherm connected", "Thermostat 2 short circuit", "Commissioning", "Gateway connected"};
                              std::string s;
                              for (int b = 0; b < 15; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                              id(system_io).publish_state(s.empty() ? "None" : s);
                              continue;
                            }
                            // boiler_control.boiler_control_flags (b28c) - bitmasker
                            if (code == "b28c") {
                              uint32_t v = (uint32_t) raw;
                              static const char* bitnames[] = {"Boiler overtemperature shutdown", "Boiler not responding", "Low load flame on", "Low load flame on (previous)", "Temperature blanking active"};
                              std::string s;
                              for (int b = 0; b < 5; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                              id(boiler_control_flags).publish_state(s.empty() ? "None" : s);
                              continue;
                            }
                            // bivalent_service.flags (f9f2) - bitmasker
                            if (code == "f9f2") {
                              uint32_t v = (uint32_t) raw;
                              static const char* bitnames[] = {"Heat pump not allowed", "HP failed, backup active", "Boiler needed", "HP COP efficiency OK", "Initial delay done", "Starting with boiler immediately", "Backup requested (previous)", "Heat pump requested", "Boiler requested", "Boiler actual state", "Boiler open-loop control", "Boiler flame detected", "Boiler flame duration short", "Low load detected", "Defrost active", "Blocking HP clock program"};
                              std::string s;
                              for (int b = 0; b < 16; b++) { if (v & (1u << b)) { if (!s.empty()) s += ", "; s += bitnames[b]; } }
                              id(bivalent_flags).publish_state(s.empty() ? "None" : s);
                              continue;
                            }

                            // generieke numerieke sensor (fallback als geen van bovenstaande codes matchte)
                            auto it = id(xtend_sensors).find(code);
                            if (it == id(xtend_sensors).end()) continue;

                            sensor::Sensor *s = std::get<0>(it->second);
                            float factor = std::get<1>(it->second);
                            bool filter_na = std::get<2>(it->second);
                            if (filter_na && (raw == 32767 || raw == -32767)) continue;

                            s->publish_state(raw * factor);
                          }

                          // BYTES/STRING SENSOREN
                          if (stats["47e0"].is<const char*>())
                            id(software_version).publish_state(stats["47e0"].as<std::string>());

                          return true;
                        });
                        id(line_buffer).clear();
                      } else {
                        id(line_buffer) += (char) c;
                      }
                    }

