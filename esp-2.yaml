# ESP-2 voor de xTend

substitutions:
  esp_name: esp-1
  ssid: YOURSSID
  password: YOUR PASSWORD

esp32:
  board: lolin_s3_mini
  framework:
    type: esp-idf

wifi:
  ssid: $ssid
  password: $password
  @use_address: 192.168.6.112
  ap:
    ssid: "${esp_name} FBHS"
    password: !secret Fallback_Hotspot

captive_portal:

logger:
  level: DEBUG

api:

ota:
  platform: esphome

time:
  - platform: homeassistant
    id: homeassistant_time

web_server:
  port: 80

json:

uart:
  id: uart_bus
  rx_pin: GPIO16
  baud_rate: 115200
  rx_buffer_size: 4096

globals:
  - id: line_buffer
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: xtend_sensors
    type: std::map<std::string, std::tuple<sensor::Sensor *, float, bool>>
    restore_value: false
  - id: error_code_map
    type: std::map<int, std::string>
    restore_value: false
  - id: working_mode_map
    type: std::map<int, std::string>
    restore_value: false
  - id: hp_mode_map
    type: std::map<int, std::string>
    restore_value: false
  - id: task_status_map
    type: std::map<int, std::string>
    restore_value: false
  - id: notification_code_map
    type: std::map<int, std::string>
    restore_value: false
  - id: lockout_code_map
    type: std::map<int, std::string>
    restore_value: false
  - id: heatdemand_status_map
    type: std::map<int, std::string>
    restore_value: false
  - id: burner_status_map
    type: std::map<int, std::string>
    restore_value: false

esphome:
  name: $esp_name
  includes:
    - <map>
    - <tuple>
  on_boot:
    then:
      - lambda: |-
          auto &m = id(xtend_sensors);
                    m["503e"] = std::make_tuple(id(hp_power_thermal), 0.001f, false);
                    m["5041"] = std::make_tuple(id(current_cop), 0.1f, false);
                    m["506a"] = std::make_tuple(id(energy_thermal_boiler_prevday), 0.1f, false);
                    m["5077"] = std::make_tuple(id(power_thermal), 0.001f, false);
                    m["5088"] = std::make_tuple(id(boiler_power_thermal), 0.001f, false);
                    m["5099"] = std::make_tuple(id(energy_electric_heating_prevday), 0.1f, false);
                    m["50ae"] = std::make_tuple(id(energy_thermal_heating_prevday), 0.1f, false);
