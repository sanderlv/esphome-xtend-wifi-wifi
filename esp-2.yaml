          // status_0.lockout_code (key 7e2c) - codes uit parse-message.js
          auto &lc = id(lockout_code_map);
          lc[1]   = "LOCKOUT_CH_PUMP";
          lc[2]   = "LOCKOUT_DHW_PUMP";
          lc[3]   = "LOCKOUT_CONDENSOR_OVERHEAT";
          lc[9]   = "LOCKOUT_ERROR_LOCKOUT_DEVICE";
          lc[10]  = "LOCKOUT_DEFROST_WATER_TEMP_LOW";
          lc[18]  = "LOCKOUT_HEATPUMP_TYPE_UNCONFIGURED";
          lc[19]  = "LOCKOUT_BMM_ILLIGAL_SERIAL";
          lc[20]  = "LOCKOUT_STORAGEHANDLER_SYNC";
          lc[22]  = "LOCKOUT_FIRMWARE_COMPATIBILITY";
          lc[23]  = "LOCKOUT_XTP_DEVICE_INTERNAL_FAULT";
          lc[24]  = "LOCKOUT_XTP_DEVICE_CONFIG_FAULT";
          lc[25]  = "LOCKOUT_XTP_COMMUNICATION_FAULT";
          lc[26]  = "LOCKOUT_XTP_START_FAULT";
          lc[31]  = "LOCKOUT_ERROR_UNKNOWN";
          lc[37]  = "LOCKOUT_SENSOR_HP_RETURN";
